<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <h1>Online Quiz App</h1>

    <div id="question">Question</div>

    <div id="answers">
        <button class="btn" onclick="checkAnswer(0)" id="btn0"></button>
        <button class="btn" onclick="checkAnswer(1)" id="btn1"></button>
        <button class="btn" onclick="checkAnswer(2)" id="btn2"></button>
        <button class="btn" onclick="checkAnswer(3)" id="btn3"></button>
    </div>

    <h2 id="score"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
